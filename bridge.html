<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Build Break — Bridge Optimizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ink:#201e1d; --ink-soft:#57534e; --ink-faint:#8a857f;
    --red:#ec3013; --steel:#8b9299; --support:#6d7075;
    --green:#2f8f3e; --fail:#d6483b; --gold:#e8b34a; --cyan:#2fa9bc;
    --pix:'Press Start 2P', monospace;
    --body:'Archivo', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  html,body{height:100%}
  body{
    background:#f3f2f2;
    background-image:linear-gradient(rgba(32,30,29,.05) 2px,transparent 2px),
                     linear-gradient(90deg,rgba(32,30,29,.05) 2px,transparent 2px);
    background-size:64px 64px;
    font-family:var(--body); color:var(--ink);
    -webkit-text-size-adjust:100%;
    -webkit-tap-highlight-color:transparent;
  }
  .page{
    min-height:100%;
    display:flex; flex-direction:column;
    padding:clamp(18px,4.5vw,56px) clamp(14px,4.5vw,64px);
    padding-bottom:calc(clamp(18px,4.5vw,56px) + env(safe-area-inset-bottom));
  }
  .kicker{
    font-family:var(--pix); font-size:clamp(9px,2.6vw,14px); letter-spacing:2px;
    color:var(--red); margin-bottom:14px; line-height:1.5;
  }
  h1{font-weight:800; font-size:clamp(26px,7vw,44px); letter-spacing:-1px; margin-bottom:8px; line-height:1.05}
  .lede{font-size:clamp(15px,3.6vw,22px); color:var(--ink-soft); margin-bottom:clamp(18px,3vw,34px); max-width:1100px; line-height:1.5}
  .lede b{color:var(--fail)}

  /* ---------- stage ---------- */
  .stage{flex:1; display:flex; gap:clamp(16px,3vw,38px); align-items:stretch; min-height:0}
  .board{
    flex:1 1 auto; min-width:0; position:relative; overflow:hidden;
    background:#e8e6e3; border:2px solid #d0cdc9; padding:clamp(10px,3vw,20px);
    display:flex; align-items:center; justify-content:center;
  }
  .board.failed{box-shadow:0 0 0 5px var(--fail); animation:mcShake .28s ease}
  .field{width:100%; max-width:1000px; display:flex; flex-direction:column; align-items:center}

  .lane{display:flex; flex-direction:column; align-items:center; margin-bottom:8px}
  .lane-label{font-family:var(--pix); font-size:clamp(9px,2.4vw,14px); color:var(--cyan); letter-spacing:1px; margin-bottom:10px}
  .goat{height:clamp(46px,13vw,86px); width:auto; image-rendering:pixelated; filter:drop-shadow(3px 4px 0 rgba(32,30,29,.18))}
  .arrow{
    width:0; height:0; margin-top:8px;
    border-left:clamp(9px,2.6vw,16px) solid transparent;
    border-right:clamp(9px,2.6vw,16px) solid transparent;
    border-top:clamp(14px,4vw,24px) solid var(--gold);
  }

  .grid{display:grid; width:100%; gap:clamp(2px,.7vw,3px)}
  .cell{position:relative; aspect-ratio:1; -webkit-tap-highlight-color:transparent}
  .cell.live{cursor:pointer}
  .blk{position:absolute; inset:4%; background:var(--steel);
       box-shadow:inset 5px 5px 0 rgba(255,255,255,.28), inset -5px -5px 0 rgba(0,0,0,.28)}
  .cell.support .blk{background:var(--support)}
  .cell.flash .blk{background:var(--fail)}
  .hole{position:absolute; inset:10%; border:2px dashed rgba(32,30,29,.16)}
  .cell.falling{animation:mcFall .95s cubic-bezier(.55,.05,.9,.4) forwards}
  .pt{position:absolute; left:50%; top:50%; width:26%; height:26%; background:#9aa0a6;
      pointer-events:none; animation:mcBurst .45s ease-out forwards}

  .ground{width:100%; height:clamp(14px,3.4vw,24px); margin-top:8px; background:#3a3f47;
    background-image:repeating-linear-gradient(45deg, rgba(0,0,0,.32) 0 7px, transparent 7px 14px);
    border-radius:3px; box-shadow:inset 0 4px 0 rgba(255,255,255,.08)}
  .supports{display:flex; justify-content:space-between; width:100%; margin-top:10px}
  .supports span{font-family:var(--pix); font-size:clamp(8px,2.3vw,14px); color:var(--ink-faint); letter-spacing:1px}

  .toast{
    position:absolute; top:14px; left:50%; transform:translateX(-50%); z-index:5;
    font-family:var(--pix); font-size:clamp(10px,2.7vw,15px); line-height:1.6;
    padding:clamp(10px,3vw,16px) clamp(12px,4vw,22px); color:#fff; text-align:center; max-width:88%;
    box-shadow:inset 3px 3px 0 rgba(255,255,255,.26), inset -3px -3px 0 rgba(0,0,0,.34);
    animation:mcPopIn .3s ease;
  }
  .toast.win{background:var(--green)} .toast.fail{background:#c0392b}

  /* ---------- controls ---------- */
  .controls{width:420px; flex:0 0 auto; display:flex; flex-direction:column; gap:18px}
  .readout{background:#fff; padding:clamp(16px,4vw,24px) clamp(16px,4vw,26px); border:2px solid var(--ink)}
  .readout .label{font-family:var(--pix); font-size:clamp(10px,2.5vw,12px); color:var(--red); letter-spacing:1px}
  .count{font-family:var(--pix); font-size:clamp(30px,8vw,46px); color:var(--ink); margin:14px 0 6px}
  .count span{font-size:clamp(14px,3.5vw,20px); color:var(--ink-faint)}
  .saved{font-size:clamp(15px,3.6vw,19px); color:var(--ink-soft); margin-bottom:14px}
  .saved b{color:var(--green)}
  .bar{height:22px; background:#dcdad7; overflow:hidden; box-shadow:inset 2px 2px 0 rgba(0,0,0,.14)}
  .bar i{display:block; width:0; height:100%; background:var(--green); transition:width .3s ease}
  .status{margin-top:16px; font-family:var(--pix); font-size:clamp(10px,2.7vw,13px); color:var(--green)}
  .status.bad{color:var(--fail)}
  .rate{margin-top:14px; display:flex; align-items:center; gap:10px}
  .stars{font-size:clamp(20px,5vw,26px); letter-spacing:3px}
  .stars .on{color:var(--gold)} .stars .off{color:#d3d0cc}
  .rate-label{font-family:var(--pix); font-size:clamp(9px,2.4vw,11px); color:var(--ink-faint)}

  .btn{
    font-family:var(--pix); font-size:clamp(11px,2.8vw,13px); line-height:1.6; color:#fff;
    border:none; padding:18px 16px; min-height:56px; cursor:pointer; text-align:left; width:100%;
    box-shadow:inset 3px 3px 0 rgba(255,255,255,.24), inset -3px -3px 0 rgba(0,0,0,.34);
    touch-action:manipulation;
  }
  .btn:active{box-shadow:inset -3px -3px 0 rgba(255,255,255,.18), inset 3px 3px 0 rgba(0,0,0,.34)}
  .btn:focus-visible{outline:3px solid var(--ink); outline-offset:3px}
  .btn.heat{background:var(--ink)} .btn.heat.on{background:var(--cyan)}
  .btn.opt{background:var(--red)} .btn.reset{background:var(--ink-soft)}

  /* ---------- phones / narrow ---------- */
  @media (max-width:860px){
    .stage{flex-direction:column}
    .controls{width:100%}
    .btn-row{display:grid; grid-template-columns:1fr 1fr; gap:10px}
    .btn-row .btn{text-align:center; padding:16px 8px}
  }
  @media (min-width:861px){ .btn-row{display:contents} }

  @keyframes mcShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
  @keyframes mcFall{0%{transform:translateY(0) rotate(0)}100%{transform:translateY(560px) rotate(26deg);opacity:0}}
  @keyframes mcBurst{from{transform:translate(-50%,-50%) scale(1);opacity:1}
                     to{transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(.2);opacity:0}}
  @keyframes mcPopIn{from{transform:translateX(-50%) scale(.7);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}
  @media (prefers-reduced-motion:reduce){
    .board.failed,.cell.falling,.pt,.toast{animation:none!important}
    .cell.falling{opacity:0}
  }
</style>
</head>

<script>
"use strict";
const el = id => document.getElementById(id);
const touch = !!(window.matchMedia && window.matchMedia('(hover:none)').matches);
el('lede').innerHTML = (touch ? 'Tap' : 'Click') + ' gray blocks to mine them and watch the count drop. Flip on the heatmap to see which blocks are actually working — try mining a <b>red</b> one and see what happens. Hit auto-optimize to land where a computer would.';

/* ---------- responsive board size ---------- */
function dims(){
  const w = window.innerWidth;
  if (w < 480) return {COLS:12, ROWS:7};
  if (w < 860) return {COLS:14, ROWS:8};
  return {COLS:18, ROWS:9};
}

let COLS, ROWS, crit, stress, critCount;
let state = {removed:{}, heatmap:false, failed:false, collapsing:false, flash:null, toasted:false};
let cells = [];           // r*COLS+c -> {wrap, inner}
let failTimer, toastTimer, toastEl = null;

const key = (r,c) => r + '-' + c;

/* ---------- structural maps (parametric in COLS/ROWS) ---------- */
function buildMaps(){
  const rowArch = c => {
    const t = (c - (COLS-1)/2) / ((COLS-1)/2);
    return Math.round((ROWS-1) - (ROWS-2)*(1 - t*t));
  };
  // strut columns as fractions of the span — matches [0,4,8,9,13,17] at COLS=18
  const STRUTS = [...new Set([0,0.235,0.47,0.53,0.765,1].map(f => Math.round(f*(COLS-1))))];
  crit = {};
  for (let c=0;c<COLS;c++){
    crit[key(0,c)] = true;                       // deck
    const ar = rowArch(c);
    crit[key(ar,c)] = true;                      // arch
    if (STRUTS.includes(c)) for (let r=0;r<=ar;r++) crit[key(r,c)] = true;
  }
  for (const c of [0,1,COLS-2,COLS-1]){ const ar = rowArch(c); for (let r=ar;r<ROWS;r++) crit[key(r,c)] = true; }
  const coords = [];
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) if (crit[key(r,c)]) coords.push([r,c]);
  stress = {};
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++){
    if (crit[key(r,c)]) { stress[key(r,c)] = 1; continue; }
    let best = 99;
    for (const [cr,cc] of coords){ const d = Math.abs(cr-r)+Math.abs(cc-c); if (d<best) best = d; }
    stress[key(r,c)] = best >= 3 ? 0.15 : best === 2 ? 0.35 : 0.6;
  }
  critCount = coords.length;
}
function stressColor(s){
  const g=[95,167,74], y=[232,179,74], r=[214,72,59];
  let col;
  if (s < .5){ const t=s/.5; col = g.map((v,i)=>Math.round(v+(y[i]-v)*t)); }
  else { const t=(s-.5)/.5; col = y.map((v,i)=>Math.round(v+(r[i]-v)*t)); }
  return 'rgb(' + col.join(',') + ')';
}
const isSupport = (r,c) => (c <= 1 || c >= COLS-2) && r === ROWS-1;
const usedCount = () => COLS*ROWS - Object.keys(state.removed).length;
function starInfo(used){
  const opt = critCount;
  const span = COLS*ROWS - opt;
  if (used <= opt + Math.max(3, Math.round(span*0.05))) return {stars:3, label:'MASTER BUILDER'};
  if (used <= opt + Math.max(10, Math.round(span*0.31))) return {stars:2, label:'NICE WORK'};
  return {stars:1, label:'KEEP MINING'};
}

/* ---------- build / paint ---------- */
function buildGrid(){
  const g = el('grid');
  g.innerHTML = '';
  g.style.gridTemplateColumns = 'repeat(' + COLS + ',1fr)';
  cells = [];
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++){
    const wrap = document.createElement('div');
    wrap.className = 'cell';
    const inner = document.createElement('div');
    wrap.appendChild(inner);
    wrap.addEventListener('click', () => onCell(r,c));
    g.appendChild(wrap);
    cells[r*COLS+c] = {wrap, inner};
  }
  paint();
}
function paint(){
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++){
    const k = key(r,c), {wrap, inner} = cells[r*COLS+c];
    const support = isSupport(r,c);
    const removed = !support && !!state.removed[k];
    wrap.className = 'cell'
      + (support ? ' support' : '')
      + (state.flash === k ? ' flash' : '')
      + (!removed && !support ? ' live' : '')
      + (state.collapsing && !support && !removed ? ' falling' : '');
    if (state.collapsing && !support && !removed) wrap.style.animationDelay = ((ROWS-1-r)*0.03) + 's';
    else wrap.style.animationDelay = '';
    inner.className = removed ? 'hole' : 'blk';
    inner.style.background = (removed || support) ? ''
      : state.flash === k ? '#d6483b'
      : state.heatmap ? stressColor(stress[k]) : '';
  }
  readout();
}
function readout(){
  const total = COLS*ROWS, used = usedCount(), saved = Math.round((total-used)/total*100);
  const rating = starInfo(used);
  el('used').textContent = used;
  el('total').textContent = ' / ' + total;
  el('saved').textContent = saved + '% lighter';
  el('bar').style.width = saved + '%';
  const st = el('status');
  st.textContent = state.failed ? '✖ STRUCTURE FAILED' : '✔ HOLDING STRONG';
  st.className = 'status' + (state.failed ? ' bad' : '');
  el('stars').innerHTML = '<span class="on">' + '★'.repeat(rating.stars) + '</span>'
                        + '<span class="off">' + '★'.repeat(3-rating.stars) + '</span>';
  el('rateLabel').textContent = rating.label;
}

/* ---------- toast ---------- */
function setToast(type, msg){
  clearToast();
  toastEl = document.createElement('div');
  toastEl.className = 'toast ' + type;
  toastEl.textContent = msg;
  el('board').appendChild(toastEl);
  toastTimer = setTimeout(clearToast, 2800);
}
function clearToast(){ clearTimeout(toastTimer); if (toastEl){ toastEl.remove(); toastEl = null; } }

/* ---------- interaction ---------- */
function burst(r,c){
  const {wrap} = cells[r*COLS+c];
  [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(d => {
    const p = document.createElement('div');
    p.className = 'pt';
    p.style.setProperty('--dx', (d[0]*40) + 'px');
    p.style.setProperty('--dy', (d[1]*40) + 'px');
    wrap.appendChild(p);
    setTimeout(() => p.remove(), 460);
  });
}
function onCell(r,c){
  if (state.collapsing) return;
  const k = key(r,c);
  if (state.removed[k] || isSupport(r,c)) return;
  if (crit[k]){
    state.failed = true; state.collapsing = true; state.flash = k;
    paint();
    el('board').classList.add('failed');
    setToast('fail', 'STRUCTURE FAILED! That block was load-bearing.');
    clearTimeout(failTimer);
    failTimer = setTimeout(() => {
      state = {removed:{}, heatmap:state.heatmap, failed:false, collapsing:false, flash:null, toasted:false};
      el('board').classList.remove('failed');
      clearToast(); paint();
    }, 1300);
    return;
  }
  state.removed[k] = true;
  paint();
  burst(r,c);
  const info = starInfo(usedCount());
  if (info.stars >= 3 && !state.toasted){
    state.toasted = true;
    setToast('win', '★★★ ' + info.label + ' — still holding!');
  }
}
function autoOptimize(){
  const rem = {};
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++){
    const k = key(r,c);
    if (!crit[k] && !isSupport(r,c)) rem[k] = true;
  }
  const used = COLS*ROWS - Object.keys(rem).length;
  const saved = Math.round((1 - used/(COLS*ROWS))*100);
  clearTimeout(failTimer);
  state.removed = rem; state.heatmap = true; state.failed = false; state.collapsing = false; state.flash = null;
  state.toasted = true;
  el('board').classList.remove('failed');
  syncHeat(); paint();
  setToast('win', '★★★ ' + starInfo(used).label + ' — ' + saved + '% lighter, still holding!');
}
function reset(){
  clearTimeout(failTimer); clearToast();
  state = {removed:{}, heatmap:state.heatmap, failed:false, collapsing:false, flash:null, toasted:false};
  el('board').classList.remove('failed');
  paint();
}
function syncHeat(){
  const b = el('bHeat');
  b.textContent = 'HEATMAP: ' + (state.heatmap ? 'ON' : 'OFF');
  b.classList.toggle('on', state.heatmap);
}
el('bHeat').onclick = () => { state.heatmap = !state.heatmap; syncHeat(); paint(); };
el('bOpt').onclick = autoOptimize;
el('bReset').onclick = reset;

/* ---------- init + responsive rebuild ---------- */
function init(){
  const d = dims();
  COLS = d.COLS; ROWS = d.ROWS;
  buildMaps();
  clearTimeout(failTimer); clearToast();
  state = {removed:{}, heatmap:state.heatmap, failed:false, collapsing:false, flash:null, toasted:false};
  el('board').classList.remove('failed');
  buildGrid();
  syncHeat();
}
let rzTimer;
window.addEventListener('resize', () => {
  clearTimeout(rzTimer);
  rzTimer = setTimeout(() => {
    const d = dims();
    if (d.COLS !== COLS || d.ROWS !== ROWS) init();
  }, 200);
});
init();
</script>
